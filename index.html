<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ruby Courbevoie</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1f5c35;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 20px;
      margin-top: 30px;
    }

    button {
      padding: 15px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 10px 0 0;
    }

    .btn-main {
      background: black;
      color: white;
    }

    .btn-outline {
      border: 2px solid black;
      background: white;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>RUBY</h1>
  <p>Bistro de famille – Courbevoie</p>

  <!-- 🔥 BOUTONS -->
  <button class="btn-main"
    onclick="window.location.href='https://www.thefork.fr/restaurant/ruby-r842502'">
    Réserver sur TheFork
  </button>

  <button class="btn-outline"
    onclick="window.location.href='tel:+33140970205'">
    Appeler le restaurant
  </button>

  <!-- 🔥 RÉSERVATION -->
  <div class="card">
    <h2>Réserver en quelques secondes</h2>

    <input id="nom" placeholder="Nom">
    <input id="tel" placeholder="Téléphone">
    <input id="date" type="date">
    <input id="heure" type="time">
    <input id="pers" placeholder="Nombre de personnes">
    <textarea id="msg" placeholder="Message"></textarea>

    <button class="btn-main" onclick="envoyerSMS()">
      Confirmer réservation
    </button>
  </div>

</div>

<script>
function envoyerSMS() {
  let message =
    "Bonjour, je souhaite réserver une table chez Ruby.%0A%0A" +
    "Nom : " + document.getElementById("nom").value + "%0A" +
    "Téléphone : " + document.getElementById("tel").value + "%0A" +
    "Date : " + document.getElementById("date").value + "%0A" +
    "Heure : " + document.getElementById("heure").value + "%0A" +
    "Personnes : " + document.getElementById("pers").value + "%0A" +
    "Message : " + document.getElementById("msg").value;

  window.location.href = "sms:0661667695?body=" + message;
}
</script>

</body>
</html>
